<svg viewBox="0 0 900 1350" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Egoville — a skyline inside Lil Ego's mind</title>
<desc>Cartoon cityscape concept: book-tower, crystal spire, throne building with crown roof, and a mug water tower, framed inside a soft thought-bubble border, with Lil Ego standing atop the tallest tower.</desc>

<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F6F0E3"/>
    <stop offset="55%" stop-color="#F3E2CB"/>
    <stop offset="100%" stop-color="#EFCBA6"/>
  </linearGradient>
  <linearGradient id="crystalGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8A66C4"/>
    <stop offset="100%" stop-color="#4E3572"/>
  </linearGradient>
  <linearGradient id="throneGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#EE7A44"/>
    <stop offset="100%" stop-color="#B8431A"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="30%" r="55%">
    <stop offset="0%" stop-color="#F2D95C" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#F2D95C" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="frame">
    <rect x="0" y="0" width="900" height="1350" rx="26"/>
  </clipPath>
</defs>

<g clip-path="url(#frame)">
<rect x="0" y="0" width="900" height="1350" fill="url(#sky)"/>
<circle cx="450" cy="340" r="360" fill="url(#glow)"/>

<!-- thought-bubble ring, mind border -->
<circle cx="450" cy="330" r="300" fill="none" stroke="#211A14" stroke-width="3" stroke-dasharray="2 14" stroke-linecap="round" opacity="0.35"/>
<circle cx="120" cy="120" r="14" fill="#FBF7EE" stroke="#211A14" stroke-width="3" opacity="0.5"/>
<circle cx="90" cy="90" r="8" fill="#FBF7EE" stroke="#211A14" stroke-width="2.5" opacity="0.5"/>

<!-- far hills -->
<path d="M0 620 Q 160 560 320 610 T 640 600 T 900 615 V 760 H 0 Z" fill="#EFE4CE"/>
<path d="M0 660 Q 200 610 420 655 T 900 645 V 780 H 0 Z" fill="#E7D6B8"/>

<!-- crystal spire (left) -->
<polygon points="180,760 240,540 300,760 270,780 210,780" fill="url(#crystalGrad)"/>
<polygon points="210,760 240,610 270,760" fill="#9B7ACC" opacity="0.55"/>
<polygon points="120,780 155,660 190,780 172,795 138,795" fill="#2C8C8A"/>
<polygon points="138,780 155,700 172,780" fill="#4FB0AD" opacity="0.6"/>

<!-- book-tower (right) -->
<rect x="660" y="640" width="150" height="30" rx="3" fill="#211A14"/>
<rect x="668" y="670" width="134" height="26" rx="3" fill="#E35B25"/>
<rect x="660" y="696" width="150" height="28" rx="3" fill="#211A14"/>
<rect x="670" y="724" width="130" height="26" rx="3" fill="#AD8330"/>
<rect x="660" y="750" width="150" height="30" rx="3" fill="#B8431A"/>
<rect x="700" y="600" width="70" height="42" rx="2" fill="#F2D95C"/>
<text x="735" y="627" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="700" fill="#211A14">READ ME</text>

<!-- throne building (center, tallest) -->
<rect x="380" y="440" width="140" height="340" rx="6" fill="url(#throneGrad)"/>
<rect x="380" y="440" width="140" height="14" fill="#211A14"/>
<!-- windows shaped like sunglasses -->
<ellipse cx="415" cy="500" rx="18" ry="13" fill="#211A14"/>
<ellipse cx="485" cy="500" rx="18" ry="13" fill="#211A14"/>
<rect x="430" y="497" width="10" height="4" fill="#211A14"/>
<rect x="392" y="560" width="34" height="34" rx="4" fill="#F6F0E3" opacity="0.85"/>
<rect x="474" y="560" width="34" height="34" rx="4" fill="#F6F0E3" opacity="0.85"/>
<rect x="392" y="620" width="34" height="34" rx="4" fill="#F6F0E3" opacity="0.85"/>
<rect x="474" y="620" width="34" height="34" rx="4" fill="#F6F0E3" opacity="0.85"/>
<rect x="392" y="680" width="34" height="34" rx="4" fill="#F6F0E3" opacity="0.85"/>
<rect x="474" y="680" width="34" height="34" rx="4" fill="#F6F0E3" opacity="0.85"/>
<!-- entrance -->
<rect x="425" y="740" width="50" height="40" rx="4" fill="#211A14"/>

<!-- gold crown roof -->
<polygon points="380,440 400,390 420,430 450,370 480,430 500,390 520,440" fill="#AD8330"/>
<polygon points="380,440 400,390 420,430 450,370 480,430 500,390 520,440" fill="none" stroke="#211A14" stroke-width="3" stroke-linejoin="round"/>
<circle cx="400" cy="390" r="6" fill="#D9B65C"/>
<circle cx="450" cy="370" r="7" fill="#D9B65C"/>
<circle cx="500" cy="390" r="6" fill="#D9B65C"/>

<!-- tiny Lil Ego on the ledge -->
<g transform="translate(450,340)">
  <ellipse cx="0" cy="34" rx="16" ry="6" fill="#211A14" opacity="0.15"/>
  <path d="M-11 34 C -11 12 -8 -2 0 -2 C 8 -2 11 12 11 34 Z" fill="#E35B25"/>
  <circle cx="0" cy="-10" r="12" fill="#9C9490"/>
  <path d="M-12 -12 Q 0 -26 12 -12 L 12 -8 Q 0 -18 -12 -8 Z" fill="#E35B25"/>
  <rect x="-10" y="-13" width="20" height="6" rx="3" fill="#211A14"/>
  <path d="M-14 -2 L14 -2 L14 -20 Q 0 -30 -14 -20 Z" fill="#E35B25" opacity="0"/>
</g>

<!-- mug water tower -->
<rect x="120" y="900" width="70" height="60" rx="8" fill="#211A14"/>
<rect x="192" y="915" width="18" height="26" rx="8" fill="none" stroke="#211A14" stroke-width="6"/>
<rect x="145" y="960" width="10" height="90" fill="#211A14"/>
<rect x="185" y="960" width="10" height="90" fill="#211A14"/>
<path d="M130 900 Q 155 880 180 900" fill="none" stroke="#AD8330" stroke-width="3" opacity="0.6"/>

<!-- street level buildings -->
<rect x="600" y="900" width="120" height="150" rx="4" fill="#EFE4CE" stroke="#211A14" stroke-width="3"/>
<rect x="615" y="920" width="24" height="24" fill="#211A14" opacity="0.7"/>
<rect x="655" y="920" width="24" height="24" fill="#211A14" opacity="0.7"/>
<rect x="695" y="920" width="24" height="24" fill="#211A14" opacity="0.7"/>
<rect x="615" y="960" width="24" height="24" fill="#211A14" opacity="0.7"/>
<rect x="655" y="960" width="24" height="24" fill="#211A14" opacity="0.7"/>
<rect x="695" y="960" width="24" height="24" fill="#211A14" opacity="0.7"/>

<rect x="750" y="950" width="90" height="100" rx="4" fill="#F2D95C" stroke="#211A14" stroke-width="3" transform="rotate(-3 795 1000)"/>

<!-- ground -->
<rect x="0" y="1050" width="900" height="300" fill="#211A14"/>
<rect x="0" y="1050" width="900" height="8" fill="#E35B25"/>

<!-- welcome sticky note sign, planted in the ground -->
<g transform="translate(340,1000) rotate(-4)">
  <rect x="0" y="0" width="220" height="90" rx="4" fill="#F2D95C" stroke="#211A14" stroke-width="3"/>
  <text x="110" y="38" text-anchor="middle" font-family="'Permanent Marker', cursive" font-size="24" fill="#211A14">EGOVILLE</text>
  <text x="110" y="66" text-anchor="middle" font-family="Caveat, cursive" font-weight="700" font-size="18" fill="#B8431A">pop. 1 (just him)</text>
  <rect x="100" y="90" width="20" height="60" fill="#211A14"/>
</g>

<!-- scattered crystal confetti at street level -->
<polygon points="60,1010 78,975 96,1010 86,1024 70,1024" fill="#2C8C8A" opacity="0.9"/>
<polygon points="820,1000 836,970 852,1000 843,1013 829,1013" fill="#8A66C4" opacity="0.9"/>
<circle cx="250" cy="1005" r="9" fill="#E35B25"/>
<circle cx="560" cy="1015" r="7" fill="#AD8330"/>

</g>
</svg>
